services:
  # Simple Hello World application
  hello-world:
    image: crccheck/hello-world
    ports:
      - "8081:8000"
    restart: unless-stopped
    labels:
      composure: ssh://gabe@melon.local

  # Nginx reverse proxy to hello-world across hosts
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    restart: unless-stopped
    command: sh -c 'echo "server { listen 80; location / { proxy_pass http://hello-world:8081; } }" > /etc/nginx/conf.d/default.conf && nginx -g "daemon off;"'
    labels:
      composure: ssh://gabe@192.168.1.204
